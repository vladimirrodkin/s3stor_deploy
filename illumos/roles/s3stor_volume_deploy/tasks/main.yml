---
- name: Create destination directory {{ s3stor_dest_path }}
  ansible.builtin.file:
    path: "{{ s3stor_dest_path }}"
    state: directory
    mode: "{{ s3stor_file_mode }}"
    owner: "{{ s3stor_file_owner }}"
    group: "{{ s3stor_file_group }}"
  become: true
  become_flags: "-n"

- name: Synchronize files from Control Node to front_nodes
  ansible.builtin.copy:
    src: "{{ s3stor_software }}/"
    dest: "{{ s3stor_dest_path }}/"
    mode: "{{ s3stor_file_mode }}"
    owner: "{{ s3stor_file_owner }}"
    group: "{{ s3stor_file_group }}"
    directory_mode: "{{ s3stor_file_mode }}"
  become: true
  become_flags: "-n"

- name: Ensure /opt/s3stor/bin directory exists
  ansible.builtin.file:
    path: /opt/s3stor/bin
    state: directory
    mode: '0755'
    owner: root
    group: root
  become: true

- name: Create ZFS dataset for data
  ansible.builtin.command: zfs create -o quota={{ s3stor_volume_data_directory_size }} -o mountpoint={{ s3stor_volume_data_directory }} {{ s3stor_volume_data_pool_name }}{{ s3stor_volume_data_directory }}
  become: true
  register: zfs_create_result
  changed_when: zfs_create_result.rc == 0
  failed_when: 
    - zfs_create_result.rc != 0
    - "'already exists' not in zfs_create_result.stderr"
  ignore_errors: false

- name: Verify ZFS dataset properties
  ansible.builtin.command: zfs get -H -o value quota,mountpoint {{ s3stor_volume_data_pool_name }}{{ s3stor_volume_data_directory }}
  become: true
  register: zfs_props
  changed_when: false
  failed_when: zfs_props.rc != 0

- name: Ensure ZFS quota is set
  ansible.builtin.command: zfs set quota={{ s3stor_volume_data_directory_size }} {{ s3stor_volume_data_pool_name }}{{ s3stor_volume_data_directory }}
  become: true
  when: "'10G' not in zfs_props.stdout"
  changed_when: true

- name: Ensure ZFS mountpoint is set
  ansible.builtin.command: zfs set mountpoint={{s3stor_volume_data_directory}} {{ s3stor_volume_data_pool_name }}{{ s3stor_volume_data_directory }}
  become: true
  when: "'/data' not in zfs_props.stdout"
  changed_when: true

- name: Deploy SMF service script
  ansible.builtin.template:
    src: s3stor-volume-smf.sh.j2
    dest: /opt/s3stor/bin/s3stor-volume-smf.sh
    mode: '0755'
    owner: root
    group: root
  become: true
  notify: Import SMF service

- name: Ensure SMF manifest directory exists
  ansible.builtin.file:
    path: /var/svc/manifest/site
    state: directory
    mode: '0755'
    owner: root
    group: root
  become: true

- name: Deploy SMF manifest
  ansible.builtin.template:
    src: s3stor-volume-smf.xml.j2
    dest: /var/svc/manifest/site/s3stor-volume.xml
    mode: '0644'
    owner: root
    group: root
  become: true
  notify: Import SMF service

- name: Import SMF service
  ansible.builtin.command: svccfg import /var/svc/manifest/site/s3stor-volume.xml
  become: true
  changed_when: false
  tags: [smf]

- name: Enable S3Stor service
  ansible.builtin.command: svcadm enable s3stor-volume
  become: true
  changed_when: false
  tags: [smf]
