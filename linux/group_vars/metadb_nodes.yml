---
valkey_version: "9.0.3"
valkey_download_url: "https://github.com/valkey-io/valkey/archive/refs/tags/{{ valkey_version }}.tar.gz"
install_dir: "/opt/valkey"
conf_dir: "/etc/valkey"
data_dir: "/var/lib/valkey"
valkey_port: 6379
cluster_timeout: 5000

# Become Settings
ansible_timeout: 60
ansible_user: argo
# ansible_ssh_private_key_file: ~/.ssh/id_ed25519
ansible_ssh_pass: "s3stor"
ansible_become: true
ansible_become_method: sudo
ansible_become_user: root
ansible_become_timeout: 60
ansible_become_ask_pass: false
ansible_host_key_checking: false
ansible_ssh_common_args: '-o ConnectTimeout=60 -o ServerAliveInterval=60 -o IdentitiesOnly=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

#Other
ansible_processor_vcpus: 4
ansible_python_interpreter: auto_silent